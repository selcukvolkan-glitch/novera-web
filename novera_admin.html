<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Novera Admin Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1A3A5C;--navy-d:#0F2340;--orange:#E05E2A;--orange-h:#F47A48;
  --bg:#F0F4F8;--surface:#fff;--border:#D8E2EE;
  --text:#1A3A5C;--muted:#6A8EAE;--label:#3A5A7C;
  --accent:var(--orange);
}
html,body{height:100%}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}

/* SETUP SCREEN */
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;gap:24px;text-align:center;padding:20px}
.setup-logo{width:64px;height:64px;background:var(--orange);border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:28px;
  font-weight:900;color:#fff;margin:0 auto 8px}
.setup-title{font-size:22px;font-weight:700;color:var(--navy)}
.setup-sub{color:var(--muted);font-size:14px;max-width:380px;line-height:1.6}
.btn-setup{background:var(--orange);color:#fff;border:none;padding:14px 32px;
  border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;
  transition:background .2s;display:flex;align-items:center;gap:8px}
.btn-setup:hover{background:var(--orange-h)}
.token-input{width:280px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;
  font-size:14px;color:var(--text);background:var(--surface)}
.token-input:focus{outline:none;border-color:var(--orange)}
.setup-note{font-size:12px;color:var(--muted);max-width:380px;line-height:1.5;
  background:rgba(26,58,92,.06);padding:10px 16px;border-radius:6px}
#setupErr{color:#C0392B;font-size:13px;display:none}

/* APP */
#app{display:none;height:100vh;flex-direction:row}
#app.on{display:flex}

/* SIDEBAR */
aside{width:230px;min-width:230px;background:var(--navy-d);display:flex;
  flex-direction:column;overflow-y:auto;flex-shrink:0}
.brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:10px}
.brand-icon{width:30px;height:30px;background:var(--orange);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  font-weight:900;color:#fff;flex-shrink:0}
.brand-name{color:#fff;font-size:13px;font-weight:700;letter-spacing:.05em}
.brand-sub{color:rgba(255,255,255,.35);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
nav{flex:1;padding:10px 0}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;
  border-left:3px solid transparent;transition:all .15s;
  color:rgba(255,255,255,.5);font-size:13px;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.nav-item.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:var(--orange);font-weight:500}
.nav-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.5}
.nav-item.active .nav-dot{opacity:1;background:var(--orange)}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);
  color:rgba(255,255,255,.25);font-size:10.5px;line-height:1.5}

/* MAIN */
main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px;height:56px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.hdr-left{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);min-width:0}
.hdr-left b{color:var(--text);font-weight:600;white-space:nowrap}
.hdr-sep{color:var(--border);flex-shrink:0}
.hdr-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:22px}
.page-grid{display:grid;gap:16px;max-width:1060px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:6px;
  border:none;cursor:pointer;font-size:12.5px;font-weight:600;transition:all .15s;
  text-decoration:none;line-height:1;font-family:inherit}
.btn-primary{background:var(--orange);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--orange-h)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--border);font-weight:500}
.btn-ghost:hover{border-color:var(--navy)}
.btn-open{background:rgba(26,58,92,.07);color:var(--navy);border:none;font-weight:500}
.btn-open:hover{background:rgba(26,58,92,.12)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  box-shadow:0 1px 8px rgba(26,58,92,.06);overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;background:#FAFBFD}
.card-title{font-size:11px;font-weight:700;color:var(--label);text-transform:uppercase;
  letter-spacing:.08em;display:flex;align-items:center;gap:7px}
.card-bar{width:3px;height:12px;border-radius:2px;background:var(--accent);flex-shrink:0}
.card-body{padding:16px}

/* FORM */
.field{margin-bottom:13px}
.field:last-child{margin-bottom:0}
label{display:block;font-size:11px;font-weight:600;color:var(--label);
  margin-bottom:5px;letter-spacing:.02em}
input[type=text],textarea{width:100%;padding:8px 10px;border:1.5px solid var(--border);
  border-radius:6px;font-size:13px;color:var(--text);background:#fff;
  font-family:inherit;transition:border-color .15s;resize:vertical}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--navy)}
textarea{min-height:70px;line-height:1.6}
.hint{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5}
.field.changed input,.field.changed textarea{border-color:var(--orange)}

/* GRIDS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.svc-item,.stat-item{border:1.5px solid var(--border);border-radius:7px;
  padding:11px 13px;background:var(--bg)}
.item-badge{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:7px}

/* STATUS */
.dirty-badge{display:none;background:var(--orange);color:#fff;font-size:11px;
  padding:2px 8px;border-radius:20px;font-weight:600}
.dirty-badge.on{display:inline-flex}
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.35}
.loading{display:flex;align-items:center;justify-content:center;height:160px;
  color:var(--muted);font-size:13px;gap:8px}
.spin{width:15px;height:15px;border:2px solid var(--border);
  border-top-color:var(--orange);border-radius:50%;animation:rot .6s linear infinite;flex-shrink:0}
@keyframes rot{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.t{background:var(--navy-d);color:#fff;padding:10px 15px;border-radius:7px;font-size:13px;
  box-shadow:0 4px 16px rgba(0,0,0,.22);opacity:0;transform:translateX(14px);
  transition:all .22s;min-width:210px;pointer-events:none}
.t.on{opacity:1;transform:translateX(0)}
.t.ok{border-left:3px solid #4CAF50}
.t.err{border-left:3px solid #F44336}
.t.warn{border-left:3px solid #FF9800}

code{font-family:monospace;background:rgba(26,58,92,.07);padding:1px 5px;border-radius:3px;font-size:11.5px}

@media(max-width:860px){.two-col{grid-template-columns:1fr} aside{width:190px;min-width:190px}}
</style>
</head>
<body>

<!-- ── SETUP SCREEN ─────────────────────────────────── -->
<div id="setup">
  <div>
    <div class="setup-logo">N</div>
    <div style="height:8px"></div>
  </div>
  <div class="setup-title">Novera Admin Panel</div>
  <div class="setup-sub">Devam etmek için yönetici parolanızı girin.</div>
  <input type="password" id="tokenInput" class="token-input" placeholder="Yönetici parolası" autocomplete="off" onkeydown="if(event.key==='Enter') login()">
  <button class="btn-setup" onclick="login()">
    <span>🔑</span> Giriş Yap
  </button>
  <div id="setupErr"></div>
  <div class="setup-note">
    Parola, sunucudaki <code>admin_api.php</code> dosyasındaki <code>ADMIN_TOKEN</code> ile aynı olmalı.<br>
    <strong>Kısayol: Ctrl+S</strong> ile kaydet
  </div>
</div>

<!-- ── ADMIN APP ────────────────────────────────────── -->
<div id="app">
  <aside>
    <div class="brand">
      <div class="brand-icon">N</div>
      <div>
        <div class="brand-name">NOVERA</div>
        <div class="brand-sub">Admin</div>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-footer" id="sideFooter">Otomatik .bak yedekleme</div>
  </aside>

  <main>
    <header>
      <div class="hdr-left">
        <b id="hdrPage">—</b>
        <span class="hdr-sep" id="hdrSep" style="display:none">›</span>
        <span id="hdrSub" style="display:none">Düzenleme</span>
      </div>
      <div class="hdr-actions">
        <span class="dirty-badge" id="dirtyBadge">● Kaydedilmemiş</span>
        <button class="btn btn-open" id="openBtn" style="display:none" onclick="openInBrowser()">↗ Önizle</button>
        <button class="btn btn-primary" id="saveBtn" disabled onclick="doSave()">💾 Kaydet</button>
      </div>
    </header>
    <div class="content" id="content">
      <div class="empty"><div class="empty-icon">◈</div><div>Sol menüden bir sayfa seçin</div></div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
'use strict';

var API_URL = 'admin_api.php';
var API_TOKEN = sessionStorage.getItem('novera_admin_token') || '';
var state = { id: null, file: null, data: null, dirty: false };

var PAGES = [
  { id:'main',     label:'Ana Sayfa',                file:'index.html',           accent:'#2C64A0' },
  { id:'esg',      label:'ESG ve Sürdürülebilirlik',  file:'novera_esg.html',      accent:'#1E7A50' },
  { id:'karbon',   label:'Karbon Yönetimi',           file:'novera_karbon.html',   accent:'#E05E2A' },
  { id:'enerji',   label:'Enerji Verimliliği',        file:'novera_enerji.html',   accent:'#1A7F88' },
  { id:'finans',   label:'Sürdürülebilir Finans',     file:'novera_finans.html',   accent:'#C0392B' },
  { id:'marka',    label:'Marka ve İletişim',         file:'novera_marka.html',    accent:'#4C3A8C' },
  { id:'strateji', label:'Kurumsal Strateji',         file:'novera_strateji.html', accent:'#1A3A5C' },
];

var mode = 'page';
var navState = null;

var NAV_KEYS    = ['hakkimizda', 'hizmetler', 'surecimiz', 'referanslar', 'standartlar', 'iletisim'];
var NAV_TITLES  = ['Hakkımızda', 'Hizmetler', 'Süreç / Model', 'Referanslar', 'Standartlar', 'İletişim'];
var NAV_DEFAULTS = ['Hakkımızda', 'Hizmetler', 'Süreç', 'Referanslar', 'Standartlar', 'İletişim'];

var IMAGES = [
  { file:'novera_logo.png',        label:'Site Logosu',                   usedIn:'Tüm sayfalar (üst menü ve footer)' },
  { file:'novera_hero_main.jpg',   label:'Ana Sayfa — Hero Görseli',       usedIn:'Ana Sayfa (hero arka planı)' },
  { file:'novera_carbon.jpg',      label:'Karbon Yönetimi Görseli',        usedIn:'Ana Sayfa (hizmet kartı), Karbon Yönetimi sayfası (hero)' },
  { file:'novera_energy.jpg',      label:'Enerji Verimliliği Görseli',     usedIn:'Ana Sayfa (hizmet kartı), Enerji Verimliliği sayfası (hero)' },
  { file:'novera_strategy.jpg',    label:'Kurumsal Strateji Görseli',      usedIn:'Ana Sayfa (hizmet kartı), Kurumsal Strateji sayfası (hero)' },
  { file:'novera_esg_bg.jpg',      label:'ESG Görseli',                    usedIn:'Ana Sayfa (hizmet kartı), ESG sayfası (hero)' },
  { file:'novera_finance_bg.jpg',  label:'Sürdürülebilir Finans Görseli',  usedIn:'Ana Sayfa (hizmet kartı), Sürdürülebilir Finans sayfası (hero)' },
  { file:'novera_marka_bg.jpg',    label:'Marka ve İletişim Görseli',      usedIn:'Ana Sayfa (hizmet kartı), Marka ve İletişim sayfası (hero)' },
];

// ── API / AUTH ────────────────────────────────────────
function authHeaders() {
  return { 'Authorization': 'Bearer ' + API_TOKEN };
}

async function apiRead(file) {
  var res = await fetch(API_URL + '?action=read&file=' + encodeURIComponent(file), { headers: authHeaders() });
  if (!res.ok) throw new Error('Okuma hatası (' + res.status + ')');
  var buf = await res.arrayBuffer();
  return new TextDecoder('utf-8', { ignoreBOM: true }).decode(buf);
}

async function apiWrite(file, content) {
  var res = await fetch(API_URL + '?action=write&file=' + encodeURIComponent(file), {
    method: 'POST',
    headers: authHeaders(),
    body: new TextEncoder().encode(content),
  });
  if (!res.ok) throw new Error('Yazma hatası (' + res.status + ')');
}

async function apiUploadImage(file, arrayBuffer) {
  var res = await fetch(API_URL + '?action=upload-image&file=' + encodeURIComponent(file), {
    method: 'POST',
    headers: authHeaders(),
    body: arrayBuffer,
  });
  if (!res.ok) throw new Error('Yükleme hatası (' + res.status + ')');
}

async function login() {
  var errEl = document.getElementById('setupErr');
  errEl.style.display = 'none';
  var token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  API_TOKEN = token;
  try {
    await apiRead('index.html');
    sessionStorage.setItem('novera_admin_token', token);
    bootApp();
  } catch(e) {
    errEl.textContent = '✗ Giriş başarısız: ' + e.message;
    errEl.style.display = 'block';
  }
}

function bootApp() {
  document.getElementById('setup').style.display = 'none';
  var app = document.getElementById('app');
  app.classList.add('on');

  var nav = document.getElementById('nav');
  nav.innerHTML = '';

  var imgItem = document.createElement('div');
  imgItem.className = 'nav-item';
  imgItem.dataset.navkey = 'images';
  imgItem.innerHTML = '<span class="nav-dot"></span>🖼 Görseller';
  imgItem.onclick = function() { loadImages(); };
  nav.appendChild(imgItem);

  var navMenuItem = document.createElement('div');
  navMenuItem.className = 'nav-item';
  navMenuItem.dataset.navkey = 'nav';
  navMenuItem.innerHTML = '<span class="nav-dot"></span>🧭 Navigasyon';
  navMenuItem.onclick = function() { loadNav(); };
  nav.appendChild(navMenuItem);

  var sep = document.createElement('div');
  sep.style.cssText = 'height:1px;background:rgba(255,255,255,.08);margin:8px 14px';
  nav.appendChild(sep);

  PAGES.forEach(function(p) {
    var el = document.createElement('div');
    el.className = 'nav-item';
    el.dataset.navkey = p.id;
    el.innerHTML = '<span class="nav-dot"></span>' + p.label;
    el.onclick = function() { loadPage(p); };
    nav.appendChild(el);
  });

  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); if (state.dirty) doSave(); }
  });
  document.getElementById('sideFooter').textContent = 'Canlı site · .bak yedek';
}

// ── FILE I/O ──────────────────────────────────────────
async function readPage(file) {
  return apiRead(file);
}

async function savePage(file, newContent) {
  // Yedekleme (.bak) ve BOM koruma sunucu tarafında (admin_api.php) yapılır.
  await apiWrite(file, newContent);
}

// ── CONTENT EXTRACT ───────────────────────────────────
function ex(html, re) {
  var m = html.match(re);
  return m ? m[1].trim() : '';
}
function exAll(html, re) {
  var results = [], m;
  re.lastIndex = 0;
  while ((m = re.exec(html)) !== null) {
    results.push(Array.from(m).slice(1).map(function(s){ return (s||'').trim(); }));
  }
  return results;
}

function extractStats(html) {
  var pats = [
    /<div class="h-stat-num">([\s\S]*?)<\/div>[\s\S]*?<div class="h-stat-label">([^<]+)<\/div>/g,
    /<div class="stat-num">([\s\S]*?)<\/div>\s*<div class="stat-label">([^<]+)<\/div>/g,
  ];
  for (var i = 0; i < pats.length; i++) {
    var hits = exAll(html, pats[i]);
    if (hits.length) return hits.slice(0,4).map(function(h){ return { raw: h[0], label: h[1] }; });
  }
  return [];
}

function extractSEO(html) {
  return {
    title:    ex(html, /<title>([\s\S]*?)<\/title>/),
    desc:     ex(html, /name="description" content="([^"]*)"/),
    keywords: ex(html, /name="keywords" content="([^"]*)"/),
  };
}

// Tüm "section-eyebrow + section-title (+ section-lead)" bloklarını sırayla bulur.
var SECTION_BLOCK_RE = /<div class="section-eyebrow"[^>]*>([^<]*)<\/div>\s*<h2 class="section-title"[^>]*>([\s\S]*?)<\/h2>(?:\s*<p class="section-lead">([\s\S]*?)<\/p>)?/g;

function scanSectionBlocks(html) {
  return exAll(html, SECTION_BLOCK_RE).map(function(m) {
    return { eyebrow: m[0], title: m[1], lead: m[2] || '' };
  });
}

function ctaSlice(html) {
  var start = html.indexOf('<section class="cta-section"');
  if (start === -1) return null;
  var end = html.indexOf('</section>', start);
  if (end === -1) return null;
  end += '</section>'.length;
  return { start: start, end: end, text: html.slice(start, end) };
}

function extractCTA(html) {
  var slice = ctaSlice(html);
  if (!slice) return null;
  var t = slice.text;
  return {
    heading: ex(t, /<h2>([\s\S]*?)<\/h2>/),
    desc:    ex(t, /<\/h2>\s*<p>([\s\S]*?)<\/p>/),
    btn:     ex(t, /class="btn-primary"[^>]*>([^<]*)<\/a>/),
  };
}

function getContent(id, html) {
  var base = {
    seo:      extractSEO(html),
    sections: scanSectionBlocks(html),
    cta:      extractCTA(html),
  };
  if (id === 'main') {
    var svcs = exAll(html, /<div class="svc-body">[\s\S]*?<h3>([^<]+)<\/h3>\s*<p>([^<]+)<\/p>/g).slice(0,6)
                 .map(function(h){ return { title: h[0], desc: h[1] }; });
    base.type = 'main';
    base.hero = {
      eyebrow: ex(html, /class="hero-eyebrow">([^<]+)<\/div>/),
      line1:   ex(html, /<h1>([^<]+)<br>/),
      line2:   ex(html, /<br><em>([^<]+)<\/em><\/h1>/),
      desc:    ex(html, /class="hero-desc">([\s\S]*?)<\/p>/),
    };
    base.stats    = extractStats(html);
    base.services = svcs;
    base.footer   = ex(html, /class="footer-desc">([^<]+)<\/p>/);
    base.email    = ex(html, /href="mailto:([^"]+)"/);
    return base;
  }
  base.type = 'subpage';
  base.hero = {
    eyebrow: ex(html, /class="hero-eyebrow">([^<]+)<\/div>/),
    h1:      ex(html, /<h1>([\s\S]*?)<\/h1>/),
    desc:    ex(html, /class="page-hero-desc">([\s\S]*?)<\/p>/),
  };
  base.stats  = extractStats(html);
  base.footer = ex(html, /class="footer-desc">([^<]+)<\/p>/);
  base.email  = ex(html, /href="mailto:([^"]+)"/);
  return base;
}

// ── CONTENT SAVE ─────────────────────────────────────
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// Bir regex'in TÜM eşleşmelerini { index, text, groups } olarak toplar.
function collectMatches(html, re) {
  var out = [], m;
  re.lastIndex = 0;
  while ((m = re.exec(html)) !== null) {
    out.push({ index: m.index, text: m[0], groups: Array.from(m).slice(1) });
  }
  return out;
}

// Eşleşmeleri sondan başa doğru, pozisyonel olarak değiştirir — aynı metin
// birden çok yerde geçse bile yalnızca doğru oluşum güncellenir.
function spliceBlocks(html, re, editFn) {
  var matches = collectMatches(html, re);
  for (var i = matches.length - 1; i >= 0; i--) {
    var newText = editFn(matches[i], i);
    if (newText != null && newText !== matches[i].text) {
      html = html.slice(0, matches[i].index) + newText + html.slice(matches[i].index + matches[i].text.length);
    }
  }
  return html;
}

function applySEO(html, prev, changes) {
  if (!changes || !prev) return html;
  if (changes.title !== undefined && changes.title !== prev.title) {
    html = html.replace(/(<title>)[\s\S]*?(<\/title>)/, '$1' + changes.title + '$2');
    html = html.replace(/(property="og:title" content=")[^"]*(")/, '$1' + esc(changes.title) + '$2');
    html = html.replace(/(name="twitter:title" content=")[^"]*(")/, '$1' + esc(changes.title) + '$2');
  }
  if (changes.desc !== undefined && changes.desc !== prev.desc) {
    html = html.replace(/(name="description" content=")[^"]*(")/, '$1' + esc(changes.desc) + '$2');
    html = html.replace(/(property="og:description" content=")[^"]*(")/, '$1' + esc(changes.desc) + '$2');
    html = html.replace(/(name="twitter:description" content=")[^"]*(")/, '$1' + esc(changes.desc) + '$2');
  }
  if (changes.keywords !== undefined && changes.keywords !== prev.keywords)
    html = html.replace(/(name="keywords" content=")[^"]*(")/, '$1' + esc(changes.keywords) + '$2');
  return html;
}

function applySections(html, prevSections, changeSections) {
  if (!Array.isArray(changeSections) || !prevSections) return html;
  return spliceBlocks(html, SECTION_BLOCK_RE, function(match, i) {
    var ps = prevSections[i], ns = changeSections[i];
    if (!ps || !ns) return null;
    var t = match.text;
    if (ns.eyebrow !== undefined && ns.eyebrow !== ps.eyebrow)
      t = t.replace(/(<div class="section-eyebrow"[^>]*>)[^<]*(<\/div>)/, '$1' + ns.eyebrow + '$2');
    if (ns.title !== undefined && ns.title !== ps.title)
      t = t.replace(/(<h2 class="section-title"[^>]*>)[\s\S]*?(<\/h2>)/, '$1' + ns.title + '$2');
    if (ns.lead !== undefined && ns.lead !== ps.lead && t.indexOf('section-lead') !== -1)
      t = t.replace(/(<p class="section-lead">)[\s\S]*?(<\/p>)/, '$1' + ns.lead + '$2');
    return t;
  });
}

function applyCTA(html, prev, changes) {
  if (!changes || !prev) return html;
  var slice = ctaSlice(html);
  if (!slice) return html;
  var t = slice.text;
  if (changes.heading !== undefined && changes.heading !== prev.heading)
    t = t.replace(/(<h2>)[\s\S]*?(<\/h2>)/, '$1' + changes.heading + '$2');
  if (changes.desc !== undefined && changes.desc !== prev.desc)
    t = t.replace(/(<\/h2>\s*<p>)[\s\S]*?(<\/p>)/, '$1' + changes.desc + '$2');
  if (changes.btn !== undefined && changes.btn !== prev.btn)
    t = t.replace(/(class="btn-primary"[^>]*>)[^<]*(<\/a>)/, '$1' + changes.btn + '$2');
  return html.slice(0, slice.start) + t + html.slice(slice.end);
}

function applyChanges(id, prev, changes, html) {
  var h   = changes.hero || {};
  var isM = id === 'main';

  if (h.eyebrow !== undefined)
    html = html.replace(/(class="hero-eyebrow">)[^<]*(<\/div>)/, '$1' + h.eyebrow + '$2');
  if (isM) {
    if (h.line1 !== undefined) html = html.replace(/(<h1>)[^<]+(<br>)/,             '$1' + h.line1 + '$2');
    if (h.line2 !== undefined) html = html.replace(/(<br><em>)[^<]+(<\/em><\/h1>)/, '$1' + h.line2 + '$2');
    if (h.desc  !== undefined) html = html.replace(/(class="hero-desc">)([\s\S]*?)(<\/p>)/, '$1' + h.desc + '$3');
  } else {
    if (h.h1   !== undefined) html = html.replace(/(<h1>)([\s\S]*?)(<\/h1>)/, '$1' + h.h1 + '$3');
    if (h.desc !== undefined) html = html.replace(/(class="page-hero-desc">)([\s\S]*?)(<\/p>)/, '$1' + h.desc + '$3');
  }

  if (Array.isArray(changes.stats)) {
    var numCls = html.includes('h-stat-num')   ? 'h-stat-num'   : 'stat-num';
    var lblCls = html.includes('h-stat-label') ? 'h-stat-label' : 'stat-label';
    changes.stats.forEach(function(ns, i) {
      if (!ns) return;
      var ps = (prev.stats || [])[i];
      if (!ps) return;
      if (ns.raw !== undefined && ns.raw !== ps.raw)
        html = html.replace(new RegExp('(class="' + numCls + '">)' + escRe(ps.raw) + '(<\\/div>)'), '$1' + ns.raw + '$2');
      if (ns.label !== undefined && ns.label !== ps.label)
        html = html.replace(new RegExp('(class="' + lblCls + '">)' + escRe(ps.label) + '(<\\/div>)'), '$1' + ns.label + '$2');
    });
  }

  if (isM && Array.isArray(changes.services)) {
    changes.services.forEach(function(ns, i) {
      if (!ns) return;
      var ps = (prev.services || [])[i];
      if (!ps) return;
      if (ns.title !== undefined && ns.title !== ps.title)
        html = html.replace(new RegExp('(<h3>)' + escRe(ps.title) + '(<\\/h3>)'), '$1' + ns.title + '$2');
      if (ns.desc !== undefined && ns.desc !== ps.desc)
        html = html.split(ps.desc).join(ns.desc);
    });
  }

  if (changes.footer !== undefined && changes.footer !== prev.footer)
    html = html.replace(/(class="footer-desc">)[^<]*/g, '$1' + changes.footer);
  if (changes.email !== undefined && changes.email !== prev.email)
    html = html.split(prev.email).join(changes.email);

  html = applySEO(html, prev.seo, changes.seo);
  html = applySections(html, prev.sections, changes.sections);
  html = applyCTA(html, prev.cta, changes.cta);

  return html;
}

// ── MODE / NAV HELPERS ────────────────────────────────
function switchModeGuard() {
  if (state.dirty && !confirm('Kaydedilmemiş değişiklikler var. Devam edilsin mi?')) return false;
  return true;
}
function setActiveNav(key) {
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.navkey === key);
  });
}

// ── LOAD PAGE ─────────────────────────────────────────
function loadPage(page) {
  if (!switchModeGuard()) return;
  mode = 'page';
  setActiveNav(page.id);
  document.getElementById('hdrPage').textContent = page.label;
  document.getElementById('hdrSep').style.display = '';
  document.getElementById('hdrSub').style.display = '';
  document.getElementById('openBtn').style.display = '';
  document.getElementById('saveBtn').style.display = '';
  document.documentElement.style.setProperty('--accent', page.accent);
  state = { id: page.id, file: page.file, data: null, dirty: false };
  setDirty(false);
  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spin"></div>Okunuyor…</div>';
  readPage(page.file).then(function(html) {
    state.data = getContent(page.id, html);
    render(state.data);
  }).catch(function(e) { toast('✗ Dosya okunamadı: ' + e.message, 'err'); });
}

// ── GÖRSELLER (global) ────────────────────────────────
function loadImages() {
  if (!switchModeGuard()) return;
  mode = 'images';
  state = { id: null, file: null, data: null, dirty: false };
  setDirty(false);
  setActiveNav('images');
  document.getElementById('hdrPage').textContent = 'Görseller';
  document.getElementById('hdrSep').style.display = 'none';
  document.getElementById('hdrSub').style.display = 'none';
  document.getElementById('openBtn').style.display = 'none';
  document.getElementById('saveBtn').style.display = 'none';
  document.documentElement.style.setProperty('--accent', '#1A3A5C');
  renderImagesGrid();
}

function formatSize(bytes) {
  if (bytes > 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  return Math.round(bytes / 1024) + ' KB';
}

function renderImagesGrid() {
  var wrap = document.getElementById('content');
  wrap.innerHTML = '<div class="page-grid" id="imgGrid" style="max-width:1060px"></div>';
  var grid = document.getElementById('imgGrid');
  IMAGES.forEach(function(img, i) {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-head"><span class="card-title"><span class="card-bar"></span>' + img.label + '</span></div>' +
      '<div class="card-body" style="display:flex;gap:14px;align-items:center">' +
        '<div style="width:120px;height:80px;border-radius:6px;overflow:hidden;background:var(--bg);' +
          'flex-shrink:0;display:flex;align-items:center;justify-content:center">' +
          '<img id="imgPrev_' + i + '" style="max-width:100%;max-height:100%;object-fit:cover" alt="">' +
        '</div>' +
        '<div style="flex:1;min-width:0">' +
          '<div style="font-size:12px;color:var(--muted);margin-bottom:4px"><code>' + img.file + '</code> · ' +
            '<span id="imgSize_' + i + '">—</span></div>' +
          '<div class="hint" style="margin:0 0 9px">' + img.usedIn + '</div>' +
          '<button class="btn btn-primary" type="button">Değiştir</button>' +
        '</div>' +
      '</div>';
    card.querySelector('button').onclick = function() { replaceImage(i); };
    grid.appendChild(card);
    loadImagePreview(img.file, i);
  });
}

function loadImagePreview(file, i) {
  var sizeEl = document.getElementById('imgSize_' + i);
  var imgEl  = document.getElementById('imgPrev_' + i);
  if (imgEl) imgEl.src = file + '?v=' + Date.now();
  fetch(file, { method: 'HEAD', cache: 'no-store' }).then(function(res) {
    if (!res.ok) throw new Error();
    var len = res.headers.get('Content-Length');
    if (sizeEl) sizeEl.textContent = len ? formatSize(parseInt(len, 10)) : '—';
  }).catch(function() {
    if (sizeEl) sizeEl.textContent = 'bulunamadı';
  });
}

function replaceImage(i) {
  var img = IMAGES[i];
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async function() {
    var file = input.files && input.files[0];
    if (!file) return;
    try {
      var bytes = await file.arrayBuffer();
      await apiUploadImage(img.file, bytes);
      toast('✓ ' + img.label + ' güncellendi', 'ok');
      loadImagePreview(img.file, i);
    } catch(e) {
      toast('✗ Hata: ' + e.message, 'err');
    }
  };
  input.click();
}

// ── NAVİGASYON (global) ───────────────────────────────
// Değişiklikler SADECE .nav-links ve .mobile-nav blokları içine uygulanır —
// footer'daki aynı #anchor'a giden ama farklı metinli linklere dokunulmaz.
function navKeyRe(key) {
  return new RegExp('(<a [^>]*href="[^"]*#' + key + '"[^>]*>)([^<]*)(<\\/a>)', 'g');
}

function navLinksSlice(html) {
  var start = html.indexOf('<ul class="nav-links">');
  if (start === -1) return null;
  var end = html.indexOf('</ul>', start);
  if (end === -1) return null;
  end += '</ul>'.length;
  return { start: start, end: end, text: html.slice(start, end) };
}

function mobileNavSlice(html) {
  var divStart = html.indexOf('<div class="mobile-nav"');
  if (divStart === -1) return null;
  var ulStart = html.indexOf('<ul', divStart);
  if (ulStart === -1) return null;
  var end = html.indexOf('</ul>', ulStart);
  if (end === -1) return null;
  end += '</ul>'.length;
  return { start: ulStart, end: end, text: html.slice(ulStart, end) };
}

function applyNavLabelsToSlice(sliceText, labels) {
  NAV_KEYS.forEach(function(key, i) {
    if (labels[i] === undefined) return;
    sliceText = sliceText.replace(navKeyRe(key), '$1' + labels[i] + '$3');
  });
  return sliceText;
}

async function readNavLabels() {
  var html = await readPage('index.html');
  var slice = navLinksSlice(html);
  if (!slice) return NAV_DEFAULTS.slice();
  return NAV_KEYS.map(function(key, i) {
    var m = navKeyRe(key).exec(slice.text);
    return m ? m[2].trim() : NAV_DEFAULTS[i];
  });
}

async function saveNavLabels(newLabels) {
  var changedFiles = 0;
  for (var p = 0; p < PAGES.length; p++) {
    var file = PAGES[p].file;
    var html;
    try { html = await readPage(file); } catch(e) { continue; }
    var orig = html;

    var navSlice = navLinksSlice(html);
    if (navSlice) {
      var newNavText = applyNavLabelsToSlice(navSlice.text, newLabels);
      if (newNavText !== navSlice.text)
        html = html.slice(0, navSlice.start) + newNavText + html.slice(navSlice.end);
    }

    var mSlice = mobileNavSlice(html);
    if (mSlice) {
      var newMobText = applyNavLabelsToSlice(mSlice.text, newLabels);
      if (newMobText !== mSlice.text)
        html = html.slice(0, mSlice.start) + newMobText + html.slice(mSlice.end);
    }

    if (html !== orig) {
      await savePage(file, html);
      changedFiles++;
    }
  }
  return changedFiles;
}

function loadNav() {
  if (!switchModeGuard()) return;
  mode = 'nav';
  state = { id: null, file: null, data: null, dirty: false };
  setDirty(false);
  setActiveNav('nav');
  document.getElementById('hdrPage').textContent = 'Navigasyon';
  document.getElementById('hdrSep').style.display = 'none';
  document.getElementById('hdrSub').style.display = 'none';
  document.getElementById('openBtn').style.display = 'none';
  document.getElementById('saveBtn').style.display = '';
  document.documentElement.style.setProperty('--accent', '#1A3A5C');
  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spin"></div>Okunuyor…</div>';
  readNavLabels().then(function(labels) {
    navState = labels;
    renderNav(labels);
  }).catch(function(e) { toast('✗ Okunamadı: ' + e.message, 'err'); });
}

function renderNav(labels) {
  var wrap = document.getElementById('content');
  wrap.innerHTML = '';
  var grid = document.createElement('div');
  grid.className = 'page-grid';
  var body = '';
  NAV_KEYS.forEach(function(key, i) {
    body += mkField(NAV_TITLES[i], 'nav[' + i + ']', labels[i], false, '');
  });
  body += '<div class="hint" style="margin-top:6px">Bu etiketler kaydedildiğinde 7 sayfanın tüm üst menülerinde ' +
    '(ve ana sayfanın mobil menüsünde) aynı anda güncellenir.</div>';
  grid.appendChild(mkCard('Navigasyon Menüsü Etiketleri', body));
  wrap.appendChild(grid);
  wrap.querySelectorAll('input,textarea').forEach(function(el) {
    el.addEventListener('input', function() {
      var f = el.closest('.field');
      if (f) f.classList.add('changed');
      setDirty(true);
    });
  });
}

function openInBrowser() {
  if (!state.file) return;
  window.open(state.file, '_blank');
}

// ── RENDER ────────────────────────────────────────────
function render(data) {
  var wrap = document.getElementById('content');
  wrap.innerHTML = '';
  var grid = document.createElement('div');
  grid.className = 'page-grid';
  grid.appendChild(heroCard(data));
  if (data.stats && data.stats.length) grid.appendChild(statsCard(data.stats));
  if (data.type === 'main' && data.services && data.services.length) grid.appendChild(servicesCard(data.services));
  if (data.sections && data.sections.length)
    sectionsCards(data.sections).forEach(function(c) { grid.appendChild(c); });
  if (data.cta) {
    var ctaEl = ctaCard(data.cta);
    if (ctaEl) grid.appendChild(ctaEl);
  }
  grid.appendChild(footerCard(data));
  grid.appendChild(seoCard(data.seo));
  wrap.appendChild(grid);
  wrap.querySelectorAll('input,textarea').forEach(function(el) {
    el.addEventListener('input', function() {
      var f = el.closest('.field');
      if (f) f.classList.add('changed');
      setDirty(true);
    });
  });
}

function mkCard(title, body) {
  var el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = '<div class="card-head"><span class="card-title"><span class="card-bar"></span>' +
    title + '</span></div><div class="card-body">' + body + '</div>';
  return el;
}

function mkField(label, path, value, isTA, hint) {
  var id  = 'f_' + path.replace(/[\[\].]/g, '_');
  var inp = isTA
    ? '<textarea id="' + id + '" data-path="' + path + '">' + esc(value) + '</textarea>'
    : '<input type="text" id="' + id + '" data-path="' + path + '" value="' + esc(value) + '">';
  return '<div class="field"><label for="' + id + '">' + label + '</label>' + inp +
    (hint ? '<div class="hint">' + hint + '</div>' : '') + '</div>';
}

function heroCard(data) {
  var body = '';
  if (data.type === 'main') {
    body += mkField('Üst Etiket', 'hero.eyebrow', data.hero.eyebrow, false, '');
    body += '<div class="two-col">' +
      mkField('Başlık — 1. Satır', 'hero.line1', data.hero.line1, false, '') +
      mkField('Başlık — Vurgu (turuncu)', 'hero.line2', data.hero.line2, false, '') +
      '</div>';
    body += mkField('Açıklama', 'hero.desc', data.hero.desc, true, '');
  } else {
    body += mkField('Üst Etiket', 'hero.eyebrow', data.hero.eyebrow, false, '');
    body += mkField('H1 Başlık (HTML kabul eder)', 'hero.h1', data.hero.h1, false,
      '<code>&lt;em&gt;Vurgu&lt;/em&gt;</code> ve <code>&lt;br&gt;</code> etiketleri kullanılabilir');
    body += mkField('Açıklama', 'hero.desc', data.hero.desc, true, '');
  }
  return mkCard('Hero Bölümü', body);
}

function statsCard(stats) {
  var body = '<div class="two-col">';
  for (var i = 0; i < stats.length; i++) {
    var s = stats[i];
    body += '<div class="stat-item"><div class="item-badge">İstatistik ' + (i + 1) + '</div>' +
      mkField('Değer', 'stats[' + i + '].raw', s.raw, false,
        'Örn: <code>15&lt;span&gt;+&lt;/span&gt;</code> veya <code>GRI·TSRS</code>') +
      mkField('Açıklama', 'stats[' + i + '].label', s.label, false, '') +
      '</div>';
  }
  body += '</div>';
  return mkCard('İstatistikler', body);
}

var SVC_LABELS = ['ESG', 'Karbon', 'Enerji', 'Finans', 'Marka', 'Strateji'];
function servicesCard(services) {
  var body = '<div class="two-col">';
  for (var i = 0; i < services.length; i++) {
    var s = services[i];
    body += '<div class="svc-item"><div class="item-badge">Kart ' + (i + 1) + ' · ' + (SVC_LABELS[i] || '') + '</div>' +
      mkField('Başlık', 'services[' + i + '].title', s.title, false, '') +
      mkField('Açıklama', 'services[' + i + '].desc', s.desc, true, '') +
      '</div>';
  }
  body += '</div>';
  return mkCard('Hizmet Kartları', body);
}

function footerCard(data) {
  return mkCard('Footer ve İletişim',
    mkField('Footer Açıklaması', 'footer', data.footer, true,
      'Birden fazla sayfada aynı metin varsa tüm sayfalarda güncellenir') +
    mkField('İletişim E-posta', 'email', data.email, false, ''));
}

function sectionsCards(sections) {
  return sections.map(function(s, i) {
    var body = mkField('Üst Etiket', 'sections[' + i + '].eyebrow', s.eyebrow, false, '');
    body += mkField('Başlık (HTML kabul eder)', 'sections[' + i + '].title', s.title, false,
      '<code>&lt;br&gt;</code> ve <code>&lt;em&gt;</code> etiketleri kullanılabilir');
    if (s.lead)
      body += mkField('Açıklama', 'sections[' + i + '].lead', s.lead, true, '');
    return mkCard('Bölüm Başlığı — ' + (s.eyebrow || (i + 1)), body);
  });
}

function ctaCard(cta) {
  if (!cta) return null;
  var body = mkField('Başlık (HTML kabul eder)', 'cta.heading', cta.heading, false,
    '<code>&lt;br&gt;</code> ve <code>&lt;em&gt;</code> etiketleri kullanılabilir');
  body += mkField('Açıklama', 'cta.desc', cta.desc, true, '');
  body += mkField('Buton Metni', 'cta.btn', cta.btn, false, '');
  return mkCard('İletişime Geçin (CTA)', body);
}

function seoCard(seo) {
  return mkCard('SEO Ayarları',
    mkField('Sayfa Başlığı', 'seo.title', seo.title, false,
      '<code>&lt;title&gt;</code>, <code>og:title</code> ve <code>twitter:title</code> birlikte güncellenir') +
    mkField('Açıklama (meta description)', 'seo.desc', seo.desc, true,
      '<code>meta description</code>, <code>og:description</code> ve <code>twitter:description</code> birlikte güncellenir') +
    mkField('Anahtar Kelimeler', 'seo.keywords', seo.keywords, false, ''));
}

// ── COLLECT & SAVE ────────────────────────────────────
function collectChanges() {
  var result = {};
  document.querySelectorAll('[data-path]').forEach(function(el) {
    setPath(result, el.dataset.path, el.value);
  });
  return result;
}

function setPath(obj, path, val) {
  var parts = path.replace(/\[(\d+)\]/g, '.$1').split('.');
  var cur = obj;
  for (var i = 0; i < parts.length - 1; i++) {
    var k = parts[i], nxt = parts[i + 1];
    if (cur[k] === undefined || cur[k] === null)
      cur[k] = isNaN(parseInt(nxt, 10)) ? {} : [];
    cur = cur[k];
  }
  cur[parts[parts.length - 1]] = val;
}

async function doSave() {
  if (!API_TOKEN) return;
  if (mode === 'nav') return doSaveNav();
  if (mode !== 'page' || !state.id) return;
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Kaydediliyor…';
  try {
    var html    = await readPage(state.file);
    var prev    = getContent(state.id, html);
    var changes = collectChanges();
    var newHtml = applyChanges(state.id, prev, changes, html);
    await savePage(state.file, newHtml);
    toast('✓ Kaydedildi', 'ok');
    setDirty(false);
    document.querySelectorAll('.field.changed').forEach(function(f){ f.classList.remove('changed'); });
    // Refresh state
    state.data = getContent(state.id, newHtml);
  } catch(e) {
    toast('✗ Hata: ' + e.message, 'err');
  } finally {
    btn.disabled = !state.dirty;
    btn.textContent = '💾 Kaydet';
  }
}

async function doSaveNav() {
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Kaydediliyor…';
  try {
    var changes = collectChanges();
    var labels = NAV_KEYS.map(function(key, i) {
      return (changes.nav && changes.nav[i] !== undefined) ? changes.nav[i] : navState[i];
    });
    var n = await saveNavLabels(labels);
    navState = labels;
    toast('✓ ' + n + ' dosya güncellendi', 'ok');
    setDirty(false);
    document.querySelectorAll('.field.changed').forEach(function(f){ f.classList.remove('changed'); });
  } catch(e) {
    toast('✗ Hata: ' + e.message, 'err');
  } finally {
    btn.disabled = !state.dirty;
    btn.textContent = '💾 Kaydet';
  }
}

// ── HELPERS ───────────────────────────────────────────
function setDirty(v) {
  state.dirty = v;
  document.getElementById('saveBtn').disabled = !v;
  document.getElementById('dirtyBadge').classList.toggle('on', v);
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type) {
  var wrap = document.getElementById('toast');
  var el = document.createElement('div');
  el.className = 't ' + (type || 'ok');
  el.textContent = msg;
  wrap.appendChild(el);
  requestAnimationFrame(function(){ el.classList.add('on'); });
  setTimeout(function(){
    el.classList.remove('on');
    setTimeout(function(){ el.remove(); }, 250);
  }, 3000);
}

// Önceden girilmiş bir token varsa otomatik giriş dene
if (API_TOKEN) {
  apiRead('index.html').then(bootApp).catch(function() {
    sessionStorage.removeItem('novera_admin_token');
    API_TOKEN = '';
  });
}
